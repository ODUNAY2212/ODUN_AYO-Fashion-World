<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Rich Golden Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA7C11" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#FFF3A8" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Crown-Inspired Monogram Logo Symbol -->
  <g transform="translate(10, 10)">
    <!-- Outer Shield/Emblem Base -->
    <path d="M 50 5 L 85 25 L 85 65 L 50 95 L 15 65 L 15 25 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Outer Crown Peaks -->
    <path d="M 28 35 L 35 20 L 50 32 L 65 20 L 72 35" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
    <circle cx="35" cy="20" r="1.5" fill="url(#goldGrad)" />
    <circle cx="50" cy="32" r="1.5" fill="url(#goldGrad)" />
    <circle cx="65" cy="20" r="1.5" fill="url(#goldGrad)" />
    
    <!-- Monogram O -->
    <ellipse cx="50" cy="55" rx="18" ry="18" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" />
    
    <!-- Monogram A inside/crossing the O -->
    <path d="M 40 68 L 50 42 L 60 68" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="44" y1="58" x2="56" y2="58" stroke="url(#goldGrad)" stroke-width="2" />
  </g>

  <!-- Typography Text -->
  <g transform="translate(115, 10)">
    <!-- "ODUN_AYO" -->
    <text x="0" y="48" font-family="'Playfair Display', 'Georgia', serif" font-size="34" font-weight="700" fill="url(#goldGrad)" letter-spacing="4">ODUN_AYO</text>
    
    <!-- "FASHION WORLD" -->
    <text x="3" y="78" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" letter-spacing="9">FASHION WORLD</text>
    
    <!-- Divider Line -->
    <line x1="3" y1="90" x2="250" y2="90" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6" />
    
    <!-- Subtitle -->
    <text x="3" y="103" font-family="'Inter', sans-serif" font-size="8.5" font-weight="300" fill="#8E8E93" letter-spacing="2.5">HAUTE COUTURE &amp; BESPOKE TAILORING</text>
  </g>
</svg>
